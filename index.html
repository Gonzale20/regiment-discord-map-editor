<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Regiment War Room | Gogland AO</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@700&family=Saira+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --mil-green: #1a3a1f; --mil-gold: #c6a84c; --mil-red: #8b2e2e;
      --mil-blue: #2e5b8b; --dark: #0a1a0d;
    }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--dark); font-family: 'Saira Condensed', sans-serif; overflow: hidden; color: #e0e0e0; }
    
    .topbar {
      height: 60px; background: var(--mil-green); border-bottom: 2px solid var(--mil-gold);
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 2000;
    }

    /* NATO Symbol Sidebar */
    .sidebar { width: 260px; background: rgba(26, 58, 31, 0.95); border-right: 1px solid var(--mil-gold); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .symbol-card { 
        background: rgba(0,0,0,0.4); border: 1px solid #444; padding: 10px; cursor: pointer; 
        text-align: center; font-family: 'Quantico'; font-size: 12px; transition: 0.2s;
    }
    .symbol-card:hover { border-color: var(--mil-gold); color: var(--mil-gold); }
    
    #map { flex-grow: 1; background: #050d06; }
    .main-layout { display: flex; height: calc(100vh - 60px); }

    .regiment-logo { font-family: 'Quantico'; color: var(--mil-gold); font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="regiment-logo"><i class="fas fa-shield-halved"></i> THE REGIMENT</div>
    <div style="font-family:'Quantico'; color: var(--mil-gold);">AO: GOGLAND TACTICAL MAP</div>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <h3 style="font-family:'Quantico'; color: var(--mil-gold); border-bottom: 1px solid; font-size: 14px;">UNIT DEPLOYMENT</h3>
      <div class="symbol-card" onclick="spawnUnit('infantry', 'blue')"><i class="fas fa-square-xmark fa-2x" style="color:var(--mil-blue)"></i><br>BLUFOR INF</div>
      <div class="symbol-card" onclick="spawnUnit('armor', 'blue')"><i class="fas fa-vector-square fa-2x" style="color:var(--mil-blue)"></i><br>BLUFOR ARMOR</div>
      <div class="symbol-card" onclick="spawnUnit('infantry', 'red')"><i class="fas fa-square-xmark fa-2x" style="color:var(--mil-red)"></i><br>OPFOR INF</div>
      
      <h3 style="font-family:'Quantico'; color: var(--mil-gold); border-bottom: 1px solid; font-size: 14px; margin-top:20px;">MISSION TOOLS</h3>
      <button onclick="clearMap()" style="background:var(--mil-red); color:white; border:none; padding:10px; cursor:pointer; font-family:'Quantico'">WIPE AO DATA</button>
    </aside>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

  <script>
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 3 });
    const goglandBounds = [[0, 0], [1000, 1000]];
    
    // Using a placeholder; replace with actual Gogland .jpg URL
    L.imageOverlay('https://api.armasites.com/maps/gogland/topographic.jpg', goglandBounds).addTo(map);
    map.fitBounds(goglandBounds);

    const drawnItems = new L.FeatureGroup().addTo(map);

    function spawnUnit(type, side) {
      const color = (side === 'blue') ? '#2e5b8b' : '#8b2e2e';
      const icon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div style="border:3px solid ${color}; background:rgba(0,0,0,0.5); width:30px; height:20px; display:flex; align-items:center; justify-content:center; color:${color}; font-weight:bold;">${type === 'infantry' ? 'X' : 'O'}</div>`,
        iconSize: [30, 20]
      });
      L.marker(map.getCenter(), {icon: icon, draggable: true}).addTo(drawnItems);
    }

    function clearMap() { if(confirm("Confirm: Clear all mission markers?")) drawnItems.clearLayers(); }
  </script>
</body>
</html>
