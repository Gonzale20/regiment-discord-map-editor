<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Regiment War Room</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a1a0d;
      font-family: Arial, sans-serif;
    }
    #map {
      width: 100%;
      height: calc(100vh - 50px);
      border: 2px solid #2a5a2f;
    }
    .topbar {
      height: 50px;
      background: #1a3a1f;
      color: #c6a84c;
      display: flex;
      align-items: center;
      padding: 0 15px;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .leaflet-control {
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="topbar">REGIMENT WAR ROOM — Interactive Tactical Map</div>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Draw Plugin (for drawing markers/lines/shapes) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

  <script>
    // initialize the map
    var map = L.map('map', {
      center: [0, 0],    // placeholder coords
      zoom: 2,
      minZoom: 1
    });

    // base map — blank grid only (no real tile source yet)
    var gridLayer = L.gridLayer({
      pane: 'tilePane',
      attribution: '',
      tileSize: 256,
      updateWhenIdle: true
    }).addTo(map);

    // gridlines
    gridLayer.createTile = function(coords) {
      const tile = document.createElement('canvas');
      tile.width = tile.height = 256;
      const ctx = tile.getContext('2d');
      ctx.strokeStyle = '#3a5a3f';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(256, 0);
      ctx.moveTo(0, 0); ctx.lineTo(0, 256);
      ctx.moveTo(256, 0); ctx.lineTo(256, 256);
      ctx.moveTo(0, 256); ctx.lineTo(256, 256);
      ctx.stroke();
      return tile;
    };

    // Drawing controls
    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    var drawControl = new L.Control.Draw({
      position: 'topright',
      draw: {
        circle: false,
        rectangle: true,
        polyline: true,
        polygon: true,
        marker: true,
        circlemarker: true
      },
      edit: {
        featureGroup: drawnItems
      }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
      drawnItems.addLayer(e.layer);
    });

    // Example function to add custom marker icon
    function addCustomMarker(lat, lng, label) {
      var icon = L.icon({
        iconUrl: 'https://placehold.co/32x32/8b2e2e/e0e0e0?text=U',
        iconSize: [32, 32],
        iconAnchor: [16, 32]
      });
      L.marker([lat, lng], { icon: icon })
        .bindPopup(label)
        .addTo(map);
    }
  </script>
</body>
</html>
